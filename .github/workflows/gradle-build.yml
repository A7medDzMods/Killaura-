name: Simple Direct Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Manual Compile
        run: |
          # 1. إنشاء مجلد للمخرجات
          mkdir -p bin
          mkdir -p build/libs
          
          # 2. تحميل مكتبة Forge 1.8.9 الأساسية لكي يفهم الكود (رابط مباشر وسريع)
          wget -O forge-bin.jar https://maven.minecraftforge.net/net/minecraftforge/forge/1.8.9-11.15.1.2318/forge-1.8.9-11.15.1.2318-universal.jar
          
          # 3. تجميع ملفات الجافا يدوياً باستخدام المكتبة
          javac -d bin -cp forge-bin.jar src/main/java/com/hypixelmod/killaura/*.java
          
          # 4. ضغط الملفات في ملف Jar واحد
          jar cvf build/libs/KillauraMod.jar -C bin .

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: My-Final-Mod
          path: build/libs/KillauraMod.jar

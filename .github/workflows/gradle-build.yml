name: Forge Gradle Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 # نستخدم 17 لتشغيل Gradle بدون أخطاء
        uses: actions/setup-java@v4
        with:
          java-version: '17' 
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          gradle wrapper
          chmod +x gradlew
          # نخبر Gradle أن يستخدم Java 8 فقط لبناء المود (للتوافق مع 1.8.9)
          ./gradlew build -Dorg.gradle.java.home=${{ env.JAVA_HOME_17_X64 }} --no-daemon -x test

      - name: Upload Mod Jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Killaura-Mod-File
          path: build/libs/*.jar

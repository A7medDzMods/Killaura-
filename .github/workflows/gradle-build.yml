name: Final Forge Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Compile with Forge Maven
        run: |
          # 1. إنشاء مجلدات العمل
          mkdir -p bin
          mkdir -p build/libs
          
          # 2. تحميل المكتبة مباشرة من سيرفر Maven Forge (الرابط الذي اخترته)
          # نستخدم النسخة universal لأنها المكتبة البرمجية الكاملة
          wget -q -O forge-library.jar "https://maven.minecraftforge.net/#/releases/1.8.9-11.15.0.1656.jar"
          
          # 3. التأكد من أن الملف تم تحميله بنجاح من السيرفر
          if [ ! -s forge-library.jar ]; then echo "Error: Maven link failed (404 or empty)"; exit 1; fi

          # 4. بناء المود (Compile) وربطه بمكتبة الفورج
          javac -d bin -cp forge-library.jar src/main/java/com/hypixelmod/killaura/*.java
          
          # 5. إنشاء ملف الـ Jar النهائي
          jar cvf build/libs/KillauraMod.jar -C bin .

      - name: Upload Final Mod
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Killaura-Mod-Final
          path: build/libs/KillauraMod.jar

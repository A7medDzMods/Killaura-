name: Build Minecraft Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Configure Forge repositories
      run: |
        mkdir -p ~/.gradle
        echo "systemProp.http.proxyHost=direct" >> ~/.gradle/gradle.properties
        echo "org.gradle.jvmargs=-Xmx2g" >> ~/.gradle/gradle.properties
    
    - name: Clean previous builds
      run: ./gradlew clean --stacktrace
      continue-on-error: true
    
    - name: Setup Forge workspace
      run: ./gradlew setupDecompWorkspace --stacktrace
      continue-on-error: true
    
    - name: Fix Forge 1.8.9 dependencies
      run: |
        echo "🔧 إصلاح مشكلة مستودعات Forge القديمة..."
        
        # إضافة المستودعات المطلوبة يدوياً
        mkdir -p ~/.gradle/caches/modules-2/files-2.1/net.minecraftforge/forge/1.8.9-11.15.0.1656-1.8.9
        
        # محاولة تحميل Forge من مصادر متعددة
        wget -O ~/forge.jar https://maven.minecraftforge.net/net/minecraftforge/forge/1.8.9-11.15.0.1656-1.8.9/forge-1.8.9-11.15.0.1656-1.8.9.jar || \
        wget -O ~/forge.jar https://files.minecraftforge.net/maven/net/minecraftforge/forge/1.8.9-11.15.0.1656-1.8.9/forge-1.8.9-11.15.0.1656-1.8.9.jar || true
    
    - name: Modify build.gradle to fix repositories
      run: |
        echo "📝 تعديل ملف build.gradle..."
        
        # إضافة المستودعات الصحيحة لـ Forge 1.8.9
        cat >> build.gradle << 'EOF'

        // إصلاح مستودعات Forge
        buildscript {
            repositories {
                maven { url = "https://maven.minecraftforge.net/" }
                maven { url = "https://files.minecraftforge.net/maven/" }
                jcenter()
                mavenCentral()
            }
        }

        repositories {
            maven { url = "https://maven.minecraftforge.net/" }
            maven { url = "https://files.minecraftforge.net/maven/" }
            maven { url = "https://libraries.minecraft.net/" }
            jcenter()
            mavenCentral()
        }

        // تجاوز مشكلة الإصدار
        configurations.all {
            resolutionStrategy {
                force 'net.minecraftforge:forge:1.8.9-11.15.0.1656-1.8.9'
            }
        }
        EOF
    
    - name: Build Minecraft Mod
      run: |
        echo "🚀 بدء بناء المود..."
        ./gradlew build --stacktrace
    
    - name: Find and list built mod files
      run: |
        echo "📦 ملفات المود المنتجة:"
        find build/libs -name "*.jar" -type f 2>/dev/null || echo "⚠️ لا يوجد مجلد build/libs"
        
    - name: Upload built mod
      uses: actions/upload-artifact@v4
      with:
        name: Minecraft-Mod-Build
        path: |
          build/libs/*.jar
          !build/libs/*-sources.jar
          !build/libs/*-javadoc.jar
        if-no-files-found: warn
        retention-days: 90
    
    - name: Show build summary
      if: always()
      run: |
        echo "## 📊 ملخص البناء" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ تم بناء المود!" >> $GITHUB_STEP_SUMMARY
        
        if [ -d "build/libs" ] && [ "$(ls -A build/libs/)" ]; then
          echo "📦 الملفات موجودة في Artifacts" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ لم يتم العثور على ملفات JAR" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Upload error logs if build failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-error-logs
        path: |
          build/gradle.log
          build/reports/
          build/test-results/
        retention-days: 30

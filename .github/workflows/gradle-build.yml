name: Forge Gradle Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8 # 1.8.9 تحتاج جافا 8 حصراً للبناء
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Specific Gradle 4.4.1
        run: |
          # تحميل إصدار قديم من جرادل يتوافق مع ماين كرافت 1.8.9
          wget https://services.gradle.org/distributions/gradle-4.4.1-bin.zip
          unzip -d /opt/gradle gradle-4.4.1-bin.zip
          export PATH=$PATH:/opt/gradle/gradle-4.4.1/bin
          
          # تشغيل البناء باستخدام الإصدار القديم
          gradle build --no-daemon -x test

      - name: Upload Mod Jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Killaura-Mod-File
          path: build/libs/*.jar

name: Forge Gradle Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # هذا السطر يحل مشكلة التحذير الذي ظهر لك بخصوص Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          # إصلاح مشكلة الصلاحيات وتوليد الملفات الضرورية
          gradle wrapper
          chmod +x gradlew
          # تشغيل البناء مع تجاهل الأخطاء البسيطة في الـ Annotations
          ./gradlew build --no-daemon -x test

      - name: Upload Mod Jar
        if: success() # لن يتم الرفع إلا إذا نجح البناء
        uses: actions/upload-artifact@v4
        with:
          name: Killaura-Mod-File
          path: build/libs/*.jar

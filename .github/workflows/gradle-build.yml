name: Build Minecraft Mod

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Configure Forge repositories
      run: |
        mkdir -p ~/.gradle
        echo "systemProp.http.proxyHost=direct" >> ~/.gradle/gradle.properties
        
    - name: Build with Gradle
      run: |
        ./gradlew clean
        ./gradlew build --stacktrace --info
      continue-on-error: true  # يستمر حتى لو فشل
    
    - name: Show error details
      if: failure()
      run: |
        cat build/gradle.log || true
        ls -la ~/.gradle/wrapper/dists/

    # رفع ملف الـ .jar الناتج كملف قابل للتحميل
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KillAura
        path: build/lib/*.jar
